methodology_summary: |

  Our solution implements a two-stage, offline-first candidate ranking pipeline that combines semantic retrieval with deterministic multi-factor scoring to identify the most relevant candidates for a given Job Description (JD). 
  During a one-time precomputation stage, candidate profiles are streamed using orjson, validated against the provided schema, filtered for honeypot and inconsistent profiles, and transformed into structured candidate documents. 
  These documents are embedded using the BAAI/bge-small-en-v1.5 model, indexed with FAISS IndexFlatIP, and stored alongside engineered candidate features as reusable artifacts.During ranking, the uploaded JD is parsed, 
  converted into a semantic embedding, and used to retrieve the most relevant candidates from the FAISS index. Retrieved candidates are then re-ranked using a weighted scoring framework that combines semantic similarity,
  technical skill alignment, behavioral signals, experience fit, and location compatibility. Rule-based integrity checks penalize suspicious profiles, 
  while deterministic explainability generates evidence-based reasoning for every recommendation without relying on external LLMs.
  This hybrid retrieval and re-ranking approach minimizes inference time by reusing precomputed artifacts, 
  satisfies the CPU-only and offline constraints, and delivers fast, reproducible, and transparent candidate rankings that go beyond traditional keyword-based matching. 




